global:
  scrape_interval: 10s # scrape metrics every 10s
  evaluation_interval: 30s

scrape_configs:
  - job_name: "vllm"
    metrics_path: '/metrics'
    static_configs:
    - targets: ['vllm:8000']
  
  - job_name: 'prometheus'
    static_configs:
    - targets: ['prometheus:9090']

  - job_name: 'streamlit-app'
    honor_timestamps: false  # Force Prometheus to use its own current clock
    metrics_path: '/metrics'
    static_configs:
    - targets: ['streamlit-app:8001']
      labels:
        env: 'prod'

  - job_name: 'notebook-test'
    static_configs:
    - targets: ['host.docker.internal:8002']
      labels:
        env: 'dev'
      