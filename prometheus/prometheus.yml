global:
  scrape_interval: 5s # scrape metrics every 5s
  evaluation_interval: 30s

scrape_configs:
  - job_name: "vllm"
    metrics_path: '/metrics'
    static_configs:
    - targets: ['vllm:8000']
  
  - job_name: 'prometheus'
    static_configs:
    - targets: ['prometheus:9090']

  - job_name: 'election_app'
    honor_timestamps: false  # Force Prometheus to use its own current clock
    metrics_path: '/metrics'
    static_configs:
      - targets: ['streamlit-app:8001']

      