apiVersion: 1

providers:
  - name: 'Default'              
    orgId: 1
    folder: ''                    # Optional: Put dashboards in a specific UI folder
    type: file
    disableDeletion: false
    editable: true
    allowUiUpdates: true
    updateIntervalSeconds: 10     # How often Grafana scans for changes
    options:
      path: /etc/grafana/provisioning/dashboards  # Path INSIDE the container
