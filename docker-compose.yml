  vllm:
    image: ${VLLM_IMAGE}
    # shm_size is critical for vLLM performance on M CPUs
    shm_size: '4gb'
    ports:
      - "${VLLM_PORT}:8000"
    profiles: ["${STACK_PROFILE:-cpu}"]         
    volumes:
      # Mount a volume for model weights cache to persist across runs
      - ~/.cache/huggingface:/root/.cache/huggingface
      - models:/root/.cache/huggingface
    command: >
      --model ${VLLM_MODEL}
      --host 0.0.0.0
      --dtype auto
      --max-model-len 1024
      --trust-remote-code
    environment:
      - HF_TOKEN=${HF_TOKEN}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 30s
      retries: 20  # Gives it time to load large models (2-3 minutes)      
      start_period: 50s
    restart: unless-stopped
