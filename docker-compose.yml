x-gpu-config: &gpu-config
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: all
            capabilities: [gpu]

services:
# Foundations
  vllm:
    image: ${VLLM_IMAGE}
    # shm_size is critical for vLLM performance on M CPUs
    shm_size: '4gb'
    ports:
      - "${VLLM_PORT}:8000"
    profiles: ["${STACK_PROFILE:-cpu}"]         
    volumes:
      # Mount a volume for model weights cache to persist across runs
      - ~/.cache/huggingface:/root/.cache/huggingface
      - models:/root/.cache/huggingface
    command: 
      - --model ${VLLM_MODEL}
      - --host 0.0.0.0
      - --dtype auto
      # - --gpu-memory-utilization 0.9
      - --max-model-len 4096
      - --max-num-batched-tokens 3264"
      - --trust-remote-code
      - --device ${VLLM_DEVICE}
    environment:
      - HF_TOKEN=${HF_TOKEN}

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 30s
      retries: 20  # Gives it time to load large models (2-3 minutes)      
      start_period: 50s
    restart: on-failure

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    ports:
      - "5005:5005"
    volumes:
      # Mount local directories to persist the SQLite DB and artifacts
      - mlflow_data:/mlflow      
      # - mlflow_data/backend:/mlflow/backend
      # - mlflow_data/artifacts:/mlflow/artifacts
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root file:///mlflow/artifacts
      --allowed-hosts "*"
      --cors-allowed-origins "*"
    restart: unless-stopped

