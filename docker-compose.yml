x-gpu-config: &gpu-config
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: all
            capabilities: [gpu]

services:
  # Foundations
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mlflow
    ports:
      - "${MLFLOW_PORT}:5000"
    volumes:
      # Mount local directories to persist the SQLite DB and artifacts
      - ./storage/mlflow_data:/mlflow      
      - ./storage/mlflow_data/backend:/mlflow/backend
      - ./storage/mlflow_data/artifacts:/mlflow/artifacts
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root file:///mlflow/artifacts
      --serve-artifacts
      --allowed-hosts "*"
      --cors-allowed-origins "*"
    restart: unless-stopped

  vllm:
    image: ${VLLM_IMAGE}
    # shm_size is critical for vLLM performance on M CPUs
    container_name: vllm
    shm_size: '4gb'
    ports:
      - "${VLLM_PORT}:8000"
    profiles: ["${STACK_PROFILE:-cpu}"]         
    volumes:
      # Mount a volume for model weights cache to persist across runs
      - ~/.cache/huggingface:/root/.cache/huggingface
      - models:/root/.cache/huggingface
    command: >
      --model ${BASE_MODEL}
      --host 0.0.0.0
      --dtype float16
      --max-model-len 2048
      --trust-remote-code
    environment:
      - HF_TOKEN=${HF_TOKEN}
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 30s
      retries: 20  # Gives it time to load large models (2-3 minutes)      
      start_period: 60s
    restart: unless-stopped

# Data ingestion
  # ingestion-job:
  #   build: 
  #     context: .
  #     dockerfile: Dockerfile.ingestion
  #   volumes:
  #     - ./data:/app/data:ro    # PDF source
  #     - ./db:/app/db:rw        # SQLite target
  #   environment:
  #     - DB_PATH=/app/db/elections.sqlite
  #   depends_on:
  #     - vllm
  #   condition: service_healthy

# Observability
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command: '--config.file=/etc/prometheus/prometheus.yml'
    ports:
      - ${PROMETHEUS_PORT}:9090
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:9090/-/healthy || exit 1"]      
      interval: 10s
      timeout: 5s
      retries: 5   
      start_period: 5s
    restart: unless-stopped
    networks:
      - monitoring_network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    volumes:
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "${GRAFANA_PORT}:3000"
    environment:
      - GF_SERVER_HTTP_ADDR=0.0.0.0    
      - GF_PROVISIONING_PATH=/etc/grafana/provisioning
      - GF_SECURITY_ADMIN_USER=admin
    healthcheck:
      # Grafana uses /api/health to report status
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    depends_on:
      prometheus: 
        condition: service_healthy
    restart: unless-stopped

  # Access/UI
  # UI Option A: Custom Streamlit App
  streamlit-app:
    container_name: streamlit-app
    build:
      context: .
      dockerfile: Dockerfile.ui
    environment:
      - BASE_MODEL=${BASE_MODEL}
      - VLLM_URL=http://${SERVER_IP}:${VLLM_PORT}/v1
        # - DB_PATH=/app/data/elections.sqlite
    ports:
      - "${UI_PORT}:8501"
    extra_hosts:
      - "host.docker.internal:host-gateway"  
    volumes:
      - .:/app
      # - ./storage:/app/storage:ro  # Store your .db and .pdf files here
    # command: streamlit run src/chat_app.py --server.address 0.0.0.0
    networks:
      - backend-net
      - monitoring_network
    depends_on:
      vllm: 
        condition: service_healthy
      prometheus:
        condition: service_healthy
      grafana:
        condition: service_healthy
    #   ingestion-job:
    #     condition: service_completed_successfully

  # UI Option B: Feature-rich Open WebUI
  # open-webui:
  #   image: ghcr.io/open-webui/open-webui:main
  #   ports: ["3000:8080"]
  #   volumes:
  #     - ./storage/open_webui_data:/app/backend/data
  #   environment:
  #     - OPENAI_API_BASE_URL=http://localhost:${VLLM_PORT}/v1/completions
  #     - OPENAI_API_KEY=unused
  #     # - ENABLE_OTEL=true
  #     # - ENABLE_OTEL_METRICS=true
  #     # - OTEL_EXPORTER_OTLP_INSECURE=true # Use insecure connection for OTLP, you may want to remove this in production
  #     # - OTEL_EXPORTER_OTLP_ENDPOINT=http://grafana:${GRAFANA_PORT}
  #     # - OTEL_SERVICE_NAME=open-webui        
  #   extra_hosts:
  #     - "host.docker.internal:host-gateway"
  #   restart: "no"

  nginx:
    image: nginx:latest
    container_name: nginx
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${NGINX_PORT:-8080}:8080"    
    extra_hosts:
      - "host.docker.internal:host-gateway"  
    depends_on:
      vllm: 
        condition: service_healthy
      streamlit-app: 
        condition: service_healthy
    restart: unless-stopped

networks:
  backend-net:
    driver: bridge
  monitoring_network:
    driver: bridge
    
volumes:
  mlflow_data:
  models:
      driver: local
  grafana_data:
  prometheus_data:
  open_webui_data:
