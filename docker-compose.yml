x-gpu-config: &gpu-config
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: all
            capabilities: [gpu]

services:
  # Foundations
  vllm:
    image: ${VLLM_IMAGE}
    container_name: vllm
    shm_size: '4gb'
    ports:
      - "${VLLM_PORT}:8000"
    profiles: ["${STACK_PROFILE:-cpu}"]         
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
      - models:/root/.cache/huggingface
      #-e VLLM_WORKER_MULTIPROC_METHOD=spawn
      # --reasoning-parser qwen3
    command: >
      --model ${BASE_MODEL}
      -e VLLM_CPU_KVCACHE_SPACE=8
      --host 0.0.0.0
      --dtype float16
      --trust-remote-code
      --enable-auto-tool-choice
      --tool-call-parser qwen3_xml
      --max-model-len ${MAX_MODEL_LEN}
      --no-enable-expert-parallel 
    environment:
      - HF_TOKEN=${HF_TOKEN}
    networks:
      - backend-net
      - monitoring_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 30s
      retries: 50     
      start_period: 60s
    restart: unless-stopped

# Observability
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command: '--config.file=/etc/prometheus/prometheus.yml'
    ports:
      - ${PROMETHEUS_PORT}:9090
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:9090/-/healthy || exit 1"]      
      interval: 10s
      timeout: 5s
      retries: 5   
      start_period: 5s
    restart: unless-stopped
    networks:
      - monitoring_network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    volumes:
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "${GRAFANA_PORT}:3000"
    environment:
      - GF_SERVER_HTTP_ADDR=0.0.0.0    
      - GF_PROVISIONING_PATH=/etc/grafana/provisioning
      - GF_SECURITY_ADMIN_USER=admin
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    depends_on:
      prometheus: 
        condition: service_healthy
    restart: unless-stopped
    networks:
      - monitoring_network

  # Access/UI
  streamlit-app:
    container_name: streamlit-app
    build:
      context: .
      dockerfile: Dockerfile.ui
    environment:
      - BASE_MODEL=${BASE_MODEL}
      - VLLM_URL=http://vllm:8000/v1
        # - DB_PATH=/app/data/elections.duckdb
    expose:
      - "8501" # making sure service is only accessible through Nginx
      - "8001"
    ports:
      - 8001:8001     
    extra_hosts:
      - "host.docker.internal:host-gateway"  
    volumes:
      - .:/app
    networks:
      - backend-net
      - monitoring_network
    depends_on:
      vllm: 
        condition: service_healthy
        required: false
      prometheus:
        condition: service_healthy
      grafana:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: nginx
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf 
    ports:
      - "${NGINX_PORT:-8080}:80"
    command: >
      /bin/sh -c "apk add --no-cache apache2-utils && 
                  htpasswd -bc /etc/nginx/.htpasswd ${USERNAME} ${VLLM_API_KEY} && 
                  exec nginx -g 'daemon off;'"     
    extra_hosts:
      - "host.docker.internal:host-gateway"  
    networks:
      - backend-net
      - monitoring_network
    depends_on:
      vllm: 
        condition: service_healthy
        required: false
      streamlit-app: 
        condition: service_healthy
    restart: unless-stopped

networks:
  backend-net:
    driver: bridge
  monitoring_network:
    driver: bridge
    
volumes:
  models:
      driver: local
  grafana_data:
  prometheus_data: